<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="PointFive developer workflow illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FCFCF9"/>
      <stop offset="1" stop-color="#F0ECE3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1D242D" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1400" height="520" rx="24" fill="url(#bg)"/>
  <circle cx="1080" cy="96" r="160" fill="#027A48" opacity=".10"/>
  <circle cx="1205" cy="380" r="118" fill="#FF6259" opacity=".12"/>
