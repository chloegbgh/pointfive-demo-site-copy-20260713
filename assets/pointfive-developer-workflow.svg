    <text x="999" y="214" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="760" fill="#1D242D">Review queue</text>
    <text x="999" y="251" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475467">Approve before</text>
