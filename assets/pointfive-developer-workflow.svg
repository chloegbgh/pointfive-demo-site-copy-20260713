    <rect x="110" y="104" width="1180" height="312" rx="26" fill="#FCFCF9" stroke="#1D242D" stroke-opacity=".10"/>
    <rect x="168" y="164" width="222" height="174" rx="18" fill="#1D242D"/>
    <text x="198" y="208" font-family="IBMPlexMono, monospace" font-size="19" font-weight="700" fill="#5DF2B6">POST /findings</text>
    <text x="198" y="253" font-family="IBMPlexMono, monospace" font-size="17" fill="#FCFCF9">{ cloud, team }</text>
    <path d="M198 298H352" stroke="#027A48" stroke-width="5" stroke-linecap="round"/>
    <path d="M430 252H555" stroke="#027A48" stroke-width="5" stroke-linecap="round"/>
    <path d="M835 252H960" stroke="#027A48" stroke-width="5" stroke-linecap="round"/>
    <rect x="555" y="164" width="280" height="174" rx="18" fill="#F5F2EC" stroke="#1D242D" stroke-opacity=".10"/>
    <text x="595" y="214" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="760" fill="#1D242D">PointFive API</text>
    <text x="595" y="251" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475467">Findings, remediation</text>
    <text x="595" y="280" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475467">context, webhook events</text>
