<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="PointFive docs automation illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FCFCF9"/>
      <stop offset="1" stop-color="#F2EFE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1D242D" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1400" height="520" rx="24" fill="url(#bg)"/>
  <circle cx="224" cy="130" r="145" fill="#027A48" opacity=".10"/>
  <circle cx="1130" cy="398" r="132" fill="#FF6259" opacity=".12"/>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="126" y="116" width="1148" height="288" rx="26" fill="#FCFCF9" stroke="#1D242D" stroke-opacity=".10"/>
    <g fill="#F5F2EC" stroke="#1D242D" stroke-opacity=".10">
      <rect x="186" y="184" width="176" height="136" rx="18"/>
      <rect x="438" y="184" width="176" height="136" rx="18"/>
      <rect x="690" y="184" width="176" height="136" rx="18"/>
      <rect x="942" y="184" width="176" height="136" rx="18"/>
    </g>
    <g stroke="#027A48" stroke-width="5" stroke-linecap="round">
      <path d="M362 252H438"/>
      <path d="M614 252H690"/>
      <path d="M866 252H942"/>
    </g>
    <text x="220" y="232" font-size="22" font-weight="760" fill="#1D242D">GitHub PR</text>
    <text x="220" y="265" font-size="17" fill="#475467">Product or API change</text>
    <text x="475" y="232" font-size="22" font-weight="760" fill="#1D242D">Docs agent</text>
    <text x="475" y="265" font-size="17" fill="#475467">Drafts the update</text>
    <text x="728" y="232" font-size="22" font-weight="760" fill="#1D242D">Human review</text>
    <text x="728" y="265" font-size="17" fill="#475467">PM + engineer approval</text>
    <text x="983" y="232" font-size="22" font-weight="760" fill="#1D242D">GitBook</text>
    <text x="983" y="265" font-size="17" fill="#475467">Publish to the right view</text>
